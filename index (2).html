</html><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Dede Akbar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #ffffff;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-left: 10px solid #3498db;
            width: 300px;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
        }
        .info {
            margin-bottom: 15px;
        }
        .label {
            font-weight: bold;
            color: #7f8c8d;
            font-size: 0.9em;
            display: block;
        }
        .value {
            font-size: 1.1em;
            color: #34495e;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Biodata Diri</h2>
        
        <div class="info">
            <span class="label">Nama Lengkap:</span>
            <span class="value">Dede Akbar</span>
        </div>

        <div class="info">
            <span class="label">Kelas:</span>
            <span class="value">11 TKJ 1</span>
        </div>

        <div class="info">
            <span class="label">Alamat:</span>
            <span class="value">Darawati City</span>
        </div>
    </div>

</body>
</html>
